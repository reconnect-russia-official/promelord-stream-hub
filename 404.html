<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PROMELORD</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.replace(/&/g, '~and~').split('/').slice(1 + pathSegmentsToKeep).join('/') +
        (l.search ? '&q=' + l.search.replace(/&/g, '~and~').slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
